openai:
  api_key: "${OPENAI_API_KEY}"
  model: "gpt-4o-mini"
  max_tokens: 2000
  temperature: 0.1
  timeout: 30

huggingface:
  api_key: "${HUGGINGFACE_API_KEY}"
  model: "google/flan-t5-large"
  max_tokens: 1000
  temperature: 0.1
  timeout: 30

extraction:
  max_retries: 3
  retry_delay: 1.0
  chunk_size: 1000
  chunk_overlap: 200
  validation_timeout: 10
